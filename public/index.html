<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamHub — hunck.ai</title>
  <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body>
  <header class="header">
    <div class="logo">📅 FamHub</div>
    <nav class="nav">
      <button class="nav-btn active" onclick="showView('calendar')">Calendar</button>
      <button class="nav-btn" onclick="showView('lists')">Lists</button>
      <button class="nav-btn" onclick="showView('meals')">Meals</button>
    </nav>
    <div class="header-right" id="header-right"></div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Google Calendar</div>
        <div id="google-status"></div>
      </div>
      <div class="sidebar-section" id="calendar-list-section" style="display:none">
        <div class="sidebar-label">Your calendars</div>
        <div id="calendar-list"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Quick add event</div>
        <textarea id="quick-paste" class="quick-paste" placeholder="Paste event details…&#10;e.g. Dentist Tue 9am"></textarea>
        <button class="add-btn primary" onclick="quickAdd()">✨ Auto-add event</button>
        <button class="text-link" onclick="showAddEvent()">or add manually</button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Family</div>
        <div id="member-list"></div>
        <button class="add-btn" onclick="showFamily()">Edit family</button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Coming up</div>
        <div id="upcoming-list"><p class="muted">Connect Google Calendar to see events.</p></div>
      </div>
    </aside>

    <main class="content">
      <div id="view-calendar">
        <div class="view-header">
          <div class="view-title" id="cal-month-label"></div>
          <div class="view-controls">
            <button class="icon-btn" onclick="changeMonth(-1)">‹</button>
            <button class="text-btn" onclick="goToday()">Today</button>
            <button class="icon-btn" onclick="changeMonth(1)">›</button>
          </div>
        </div>
        <div id="calendar-grid"></div>
        <div id="loading-events" class="loading" style="display:none">Loading Google Calendar events…</div>
      </div>

      <div id="view-lists" style="display:none">
        <div class="view-header"><div class="view-title">Shared lists</div></div>
        <div class="lists-grid">
          <div class="list-card">
            <h3>🛒 Grocery list</h3>
            <ul id="grocery-list" class="checklist"></ul>
            <div class="add-item-row"><input type="text" placeholder="Add item…" id="grocery-input"><button onclick="addItem('grocery')">Add</button></div>
          </div>
          <div class="list-card">
            <h3>✅ Family to-dos</h3>
            <ul id="todo-list" class="checklist"></ul>
            <div class="add-item-row"><input type="text" placeholder="Add item…" id="todo-input"><button onclick="addItem('todo')">Add</button></div>
          </div>
        </div>
      </div>

      <div id="view-meals" style="display:none">
        <div class="view-header"><div class="view-title">Weekly meal planner</div></div>
        <div class="meals-grid" id="meals-grid"></div>
      </div>
    </main>
  </div>

  <div id="modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h3>Add to calendar</h3>
      <div class="paste-box">
        <label>📋 Paste event details</label>
        <textarea id="ev-paste" placeholder="e.g. Emma's soccer practice Saturday 3pm at Lincoln Park"></textarea>
        <button class="btn-parse" onclick="parsePaste()">✨ Auto-fill</button>
        <div id="parse-hint" class="parse-hint"></div>
      </div>
      <div class="modal-divider"><span>or enter manually</span></div>
      <div class="field"><label>Event name</label><input type="text" id="ev-title" placeholder="e.g. Emma's soccer practice"></div>
      <div class="field-row">
        <div class="field"><label>Date</label><input type="date" id="ev-date"></div>
        <div class="field"><label>Time</label><input type="time" id="ev-time" value="09:00"></div>
      </div>
      <label class="allday-row"><input type="checkbox" id="ev-allday" onchange="toggleAllDay()"> All day</label>
      <div class="field"><label>Location</label><input type="text" id="ev-location" placeholder="Optional"></div>
      <div class="field"><label>Calendar</label><select id="ev-calendar"></select></div>
      <div class="field"><label>Notes</label><textarea id="ev-notes" placeholder="Any details for the family…"></textarea></div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" id="ev-save" onclick="saveEvent()">Add to calendar</button>
      </div>
    </div>
  </div>

  <div id="family-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeFamily()">
    <div class="modal-box">
      <h3>Edit family</h3>
      <div id="family-rows" class="family-rows"></div>
      <button class="add-btn" onclick="addMember()">+ Add member</button>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeFamily()">Cancel</button>
        <button class="btn-save" onclick="saveFamily()">Save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none"></div>
  <script src="/js/app.js?v=2"></script>
</body>
</html>
